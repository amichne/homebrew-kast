name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

permissions:
  contents: read

jobs:
  formulas:
    name: Homebrew package syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check Ruby package files
        run: ruby -c Formula/kast.rb && ruby -c Casks/kast-plugin.rb
