name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

permissions:
  contents: read

jobs:
  formulas:
    name: Homebrew package contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Test formula contracts
        run: ./.github/scripts/test-formulas.py
