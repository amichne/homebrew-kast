name: Publish Aligned Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish, for example v0.7.16. Leave blank for the next patch after release-state.json."
        required: false
        default: ""
        type: string
      kast_rs_ref:
        description: "kast-rs ref to tag when the release tag does not already exist"
        required: true
        default: main
        type: string
      kast_ref:
        description: "kast ref to tag when the release tag does not already exist"
        required: true
        default: main
        type: string
      build_cli:
        description: "Create the kast-rs tag and wait for Rust CLI release assets"
        required: true
        default: true
        type: boolean
      build_plugin:
        description: "Create the kast tag and wait for IntelliJ plugin release assets"
        required: true
        default: true
        type: boolean
      publish_formula:
        description: "Update and push the Homebrew package files after compatibility checks pass"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-aligned-release
  cancel-in-progress: false

jobs:
  publish:
    name: Publish aligned release
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GH_TOKEN: ${{ secrets.RELEASE_ORCHESTRATION_TOKEN || secrets.HOMEBREW_TAP_TOKEN }}
      VERSION_INPUT: ${{ inputs.version }}
      KAST_RS_REF: ${{ inputs.kast_rs_ref }}
      KAST_REF: ${{ inputs.kast_ref }}
      BUILD_CLI: ${{ inputs.build_cli }}
      BUILD_PLUGIN: ${{ inputs.build_plugin }}
      PUBLISH_FORMULA: ${{ inputs.publish_formula }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate request
        id: request
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::Missing RELEASE_ORCHESTRATION_TOKEN or HOMEBREW_TAP_TOKEN secret."
            exit 1
          fi

          tag_exists() {
            local repo="$1"
            local release_tag="$2"
            gh api "repos/${repo}/git/ref/tags/${release_tag}" >/dev/null 2>&1
          }

          if [[ -z "${VERSION_INPUT// }" ]]; then
            tag="$(./.github/scripts/release-state.py next-patch)"
            while tag_exists amichne/kast-rs "$tag" || tag_exists amichne/kast "$tag"; do
              echo "Release tag ${tag} already exists upstream; trying the next patch."
              tag="$(./.github/scripts/release-state.py next-patch "$tag")"
            done
            echo "No version input supplied; using next available patch release ${tag}."
          else
            tag="$VERSION_INPUT"
            [[ "$tag" == v* ]] || tag="v${tag}"
          fi
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version must be a stable semver tag like v1.2.3; got ${VERSION_INPUT}"
            exit 1
          fi
          ./.github/scripts/release-state.py require-after-current "$tag" >/dev/null

          if [[ "$BUILD_CLI" != "true" && "$BUILD_PLUGIN" != "true" ]]; then
            echo "::error::At least one of build_cli or build_plugin must be true."
            exit 1
          fi

          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Start upstream releases
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.request.outputs.tag }}"
          started="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          printf 'started=%s\n' "$started" >> "$GITHUB_OUTPUT"

          ensure_tag() {
            local repo="$1"
            local ref="$2"

            if gh api "repos/${repo}/git/ref/tags/${tag}" >/dev/null 2>&1; then
              echo "${repo} already has ${tag}; release workflow will not be retriggered."
              return
            fi

            local sha
            sha="$(gh api "repos/${repo}/commits/${ref}" --jq .sha)"
            [[ -n "$sha" ]] || { echo "Unable to resolve ${repo}@${ref}" >&2; exit 1; }

            echo "Creating ${repo} ${tag} at ${sha}"
            gh api -X POST "repos/${repo}/git/refs" \
              -f "ref=refs/tags/${tag}" \
              -f "sha=${sha}" >/dev/null
          }

          if [[ "$BUILD_CLI" == "true" ]]; then
            ensure_tag amichne/kast-rs "$KAST_RS_REF"
          fi

          if [[ "$BUILD_PLUGIN" == "true" ]]; then
            ensure_tag amichne/kast "$KAST_REF"
          fi

      - name: Wait for selected release workflows
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.request.outputs.tag }}"
          started="${{ steps.upstream.outputs.started }}"

          release_has_asset() {
            local repo="$1"
            local asset="$2"
            gh release view "$tag" --repo "$repo" --json assets --jq '.assets[].name' 2>/dev/null \
              | grep -Fxq "$asset"
          }

          release_ready() {
            local repo="$1"
            shift

            local is_draft
            is_draft="$(gh release view "$tag" --repo "$repo" --json isDraft --jq .isDraft 2>/dev/null || true)"
            [[ "$is_draft" == "false" ]] || return 1

            local asset
            for asset in "$@"; do
              release_has_asset "$repo" "$asset" || return 1
            done
          }

          find_release_run() {
            local repo="$1"
            local event="$2"
            local created_filter="${3:-}"

            local args=(
              --repo "$repo"
              --workflow release.yml
              --event "$event"
              --limit 50
              --json databaseId,createdAt,displayTitle,headBranch
              --jq "map(select(.headBranch == \"${tag}\" or (.displayTitle | contains(\"${tag}\")))) | sort_by(.createdAt) | last | .databaseId // \"\""
            )
            if [[ -n "$created_filter" ]]; then
              args+=(--created "$created_filter")
            fi
            gh run list "${args[@]}"
          }

          wait_for_release_run() {
            local repo="$1"
            local event="$2"
            shift 2
            local deadline=$((SECONDS + 7200))
            local run_id=""

            if release_ready "$repo" "$@"; then
              echo "${repo} already has a published ${tag} release with all required assets."
              return
            fi

            while [[ -z "$run_id" && "$SECONDS" -lt "$deadline" ]]; do
              if release_ready "$repo" "$@"; then
                echo "${repo} published ${tag} with all required assets."
                return
              fi

              run_id="$(find_release_run "$repo" "$event" ">=$started")"
              if [[ -z "$run_id" ]]; then
                run_id="$(find_release_run "$repo" "$event")"
              fi

              if [[ -z "$run_id" ]]; then
                sleep 15
              fi
            done

            [[ -n "$run_id" ]] || { echo "Timed out waiting for ${repo} release workflow for ${tag}" >&2; exit 1; }
            run_url="$(gh run view "$run_id" --repo "$repo" --json url --jq .url)"
            echo "Watching ${repo} release workflow for ${tag}: ${run_url}"
            if ! gh run watch "$run_id" --repo "$repo" --exit-status --compact --interval 20; then
              echo "::error::${repo} release workflow failed for ${tag}: ${run_url}" >&2
              exit 1
            fi

            while ! release_ready "$repo" "$@"; do
              [[ "$SECONDS" -lt "$deadline" ]] || {
                echo "Timed out waiting for ${repo} ${tag} release assets after ${run_url}" >&2
                exit 1
              }
              sleep 10
            done
          }

          cli_assets=(
            "kast-${tag}-macos-x64.zip"
            "kast-${tag}-macos-arm64.zip"
            "kast-${tag}-linux-x64.zip"
            "kast-${tag}-linux-arm64.zip"
            "SHA256SUMS"
          )
          plugin_assets=(
            "kast-intellij-${tag}.zip"
            "kast-headless-${tag}.zip"
            "SHA256SUMS"
          )

          if [[ "$BUILD_CLI" == "true" ]]; then
            wait_for_release_run amichne/kast-rs push "${cli_assets[@]}"
          fi

          if [[ "$BUILD_PLUGIN" == "true" ]]; then
            wait_for_release_run amichne/kast push "${plugin_assets[@]}"
          fi

      - name: Verify aligned release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.request.outputs.tag }}"
          version="${{ steps.request.outputs.version }}"
          release_dir="$RUNNER_TEMP/aligned-release-assets"
          rm -rf "$release_dir"
          mkdir -p "$release_dir/kast-rs" "$release_dir/kast"

          download_asset() {
            local repo="$1"
            local asset="$2"
            local dest="$3"
            echo "Downloading ${repo} ${asset}"
            if ! gh release download "$tag" --repo "$repo" --pattern "$asset" --dir "$dest"; then
              echo "Missing ${repo} release asset: ${asset}" >&2
              exit 1
            fi
            [[ -f "$dest/$asset" ]] || { echo "Missing ${repo} release asset: ${asset}" >&2; exit 1; }
          }

          cli_assets=(
            "kast-${tag}-macos-x64.zip"
            "kast-${tag}-macos-arm64.zip"
            "kast-${tag}-linux-x64.zip"
            "kast-${tag}-linux-arm64.zip"
          )
          for asset in "${cli_assets[@]}"; do
            download_asset amichne/kast-rs "$asset" "$release_dir/kast-rs"
          done
          download_asset amichne/kast-rs SHA256SUMS "$release_dir/kast-rs"

          plugin_asset="kast-intellij-${tag}.zip"
          headless_asset="kast-headless-${tag}.zip"
          download_asset amichne/kast "$plugin_asset" "$release_dir/kast"
          download_asset amichne/kast "$headless_asset" "$release_dir/kast"
          download_asset amichne/kast SHA256SUMS "$release_dir/kast"

          (
            cd "$release_dir/kast-rs"
            for asset in "${cli_assets[@]}"; do
              grep -F "  ${asset}" SHA256SUMS
            done | sha256sum --check --strict
          )

          (
            cd "$release_dir/kast"
            for asset in "$plugin_asset" "$headless_asset"; do
              grep -F "  ${asset}" SHA256SUMS
            done | sha256sum --check --strict
          )

          unzip -q "$release_dir/kast-rs/kast-${tag}-linux-x64.zip" -d "$release_dir/cli-linux-x64"
          chmod 755 "$release_dir/cli-linux-x64/kast"
          cli_version_output="$("$release_dir/cli-linux-x64/kast" version 2>&1 || "$release_dir/cli-linux-x64/kast" --version 2>&1)"
          echo "$cli_version_output"
          if ! grep -Fq "$version" <<<"$cli_version_output"; then
            echo "Rust CLI version output did not contain ${version}" >&2
            exit 1
          fi

          if ! unzip -Z1 "$release_dir/kast/$plugin_asset" | grep -Fxq "backend-intellij/lib/backend-intellij-${version}.jar"; then
            echo "IntelliJ plugin asset does not contain backend-intellij-${version}.jar" >&2
            exit 1
          fi

          if ! unzip -Z1 "$release_dir/kast/$headless_asset" | grep -Eq "backend-headless/.*/backend-headless-${version}[^/]*-plugin-descriptor\\.jar|backend-headless/idea-home/plugins/kast-headless/lib/backend-headless-${version}\\.jar"; then
            echo "Headless backend asset does not contain backend-headless-${version}-plugin-descriptor.jar" >&2
            exit 1
          fi

          sha256_for() {
            local sums="$1"
            local asset="$2"
            local digest
            digest="$(awk -v name="$asset" '$2 == name { print $1 }' "$sums")"
            [[ -n "$digest" ]] || { echo "Missing SHA256SUMS entry: ${asset}" >&2; exit 1; }
            printf '%s\n' "$digest"
          }

          printf 'sha256_macos_x64=%s\n' "$(sha256_for "$release_dir/kast-rs/SHA256SUMS" "kast-${tag}-macos-x64.zip")" >> "$GITHUB_OUTPUT"
          printf 'sha256_macos_arm64=%s\n' "$(sha256_for "$release_dir/kast-rs/SHA256SUMS" "kast-${tag}-macos-arm64.zip")" >> "$GITHUB_OUTPUT"
          printf 'sha256_linux_x64=%s\n' "$(sha256_for "$release_dir/kast-rs/SHA256SUMS" "kast-${tag}-linux-x64.zip")" >> "$GITHUB_OUTPUT"
          printf 'sha256_linux_arm64=%s\n' "$(sha256_for "$release_dir/kast-rs/SHA256SUMS" "kast-${tag}-linux-arm64.zip")" >> "$GITHUB_OUTPUT"
          printf 'sha256_plugin=%s\n' "$(sha256_for "$release_dir/kast/SHA256SUMS" "$plugin_asset")" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew packages
        if: inputs.publish_formula
        env:
          VERSION: ${{ steps.request.outputs.tag }}
          SHA256_MACOS_X64: ${{ steps.assets.outputs.sha256_macos_x64 }}
          SHA256_MACOS_ARM64: ${{ steps.assets.outputs.sha256_macos_arm64 }}
          SHA256_LINUX_X64: ${{ steps.assets.outputs.sha256_linux_x64 }}
          SHA256_LINUX_ARM64: ${{ steps.assets.outputs.sha256_linux_arm64 }}
          SHA256_PLUGIN: ${{ steps.assets.outputs.sha256_plugin }}
        run: ./.github/scripts/update-formulas.py

      - name: Validate Homebrew packages
        if: inputs.publish_formula
        run: |
          set -euo pipefail
          ./.github/scripts/test-formulas.py
          ruby -c Formula/kast.rb
          ruby -c Casks/kast-plugin.rb
          git diff --check

      - name: Commit and push Homebrew packages
        if: inputs.publish_formula
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.request.outputs.tag }}"

          if git diff --quiet -- Formula/kast.rb Casks/kast-plugin.rb README.md release-state.json; then
            echo "Homebrew packages already up to date for ${tag}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kast.rb Casks/kast-plugin.rb README.md release-state.json
          git commit -m "kast ${tag}"
          git push
