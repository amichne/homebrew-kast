name: Update Formula

on:
  repository_dispatch:
    types: [release-published]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Ignore legacy component dispatches
        if: ${{ github.event.client_payload.component != null && github.event.client_payload.component != '' }}
        env:
          COMPONENT: ${{ github.event.client_payload.component }}
        run: |
          set -euo pipefail
          echo "Ignoring legacy component-only dispatch for ${COMPONENT}."
          echo "Use Publish Aligned Release or send one atomic payload with CLI and plugin checksums."

      - name: Verify aligned releases
        if: ${{ github.event.client_payload.component == null || github.event.client_payload.component == '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"

          require_asset() {
            local repo="$1"
            local asset="$2"
            local assets
            assets="$(gh release view "v${version}" --repo "$repo" --json assets --jq '.assets[].name')"
            if ! grep -Fxq "$asset" <<<"$assets"; then
              echo "Missing ${asset} in ${repo} v${version}" >&2
              exit 1
            fi
          }

          require_asset amichne/kast-rs "kast-v${version}-macos-x64.zip"
          require_asset amichne/kast-rs "kast-v${version}-macos-arm64.zip"
          require_asset amichne/kast-rs "kast-v${version}-linux-x64.zip"
          require_asset amichne/kast-rs "kast-v${version}-linux-arm64.zip"
          require_asset amichne/kast "kast-intellij-v${version}.zip"

      - name: Update Formula
        if: ${{ github.event.client_payload.component == null || github.event.client_payload.component == '' }}
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA256_LINUX_X64: ${{ github.event.client_payload.sha256_linux_x64 }}
          SHA256_LINUX_ARM64: ${{ github.event.client_payload.sha256_linux_arm64 }}
          SHA256_MACOS_X64: ${{ github.event.client_payload.sha256_macos_x64 }}
          SHA256_MACOS_ARM64: ${{ github.event.client_payload.sha256_macos_arm64 }}
          SHA256_PLUGIN: ${{ github.event.client_payload.sha256_plugin }}
        run: |
          set -euo pipefail
          ./.github/scripts/update-formulas.py

      - name: Commit and push
        if: ${{ github.event.client_payload.component == null || github.event.client_payload.component == '' }}
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"

          if git diff --quiet -- Formula/kast.rb Casks/kast-plugin.rb; then
            echo "Homebrew packages already up to date for ${VERSION}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kast.rb Casks/kast-plugin.rb
          git commit -m "kast v${version}"
          git push
